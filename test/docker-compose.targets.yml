# Lokal sinov target'lari: Rocky Linux 9 + systemd (soxta RHEL agentlar).
# FAQAT SINOV UCHUN — privileged + cgroup host kerak. Prod'da ishlatilmaydi.
services:
  rocky-target-1:
    image: rockylinux:9
    container_name: rocky-target-1
    privileged: true
    command: /sbin/init
    cgroup: host
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    networks: [tizim]

networks:
  tizim:
    name: tizim_net
    external: true
