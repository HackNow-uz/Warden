# TIZIM production override (vendored Wazuh compose ustiga).
# - indexer/manager'ni shared `tizim_net`'ga DEKLARATIV ulaydi (service-name = alias):
#   orchestrator `wazuh.indexer`/`wazuh.manager`'ga TLS-mos yetadi, `docker network
#   connect` qo'lda KERAK EMAS — restart/recreate'dan keyin ham saqlanadi.
# - resurs limitlari: shared hostda boshqa servislarni siqib qo'ymaslik uchun.
networks:
  tizim:
    name: tizim_net
    external: true

services:
  wazuh.indexer:
    networks: [default, tizim]
    mem_limit: 3g
    cpus: 2

  wazuh.manager:
    networks: [default, tizim]
    mem_limit: 1g
    cpus: 1.5

  wazuh.dashboard:
    mem_limit: 1g
    cpus: 1
